<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KillYouToken</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
      color: white;
    }

    canvas#rain {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 85%, rgba(255, 0, 50, 0.22), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(255, 0, 50, 0.12), transparent 45%),
        linear-gradient(to bottom, #000 0%, #000 65%, #060000 85%, #120000 100%);
    }

    .scanline {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02) 0px,
        rgba(255,255,255,0.02) 1px,
        transparent 2px,
        transparent 4px
      );
      opacity: 0.15;
    }

    .wrap {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .content {
      text-align: center;
      max-width: 1400px;
      width: 100%;
      animation: fadeUp 1.2s ease-out forwards;
    }

    h1 {
      font-size: clamp(64px, 11vw, 180px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #ff1a1a;
      text-transform: none;
      margin-bottom: 34px;
      position: relative;
      display: inline-block;
      text-shadow:
        0 0 6px rgba(255, 0, 0, 0.95),
        0 0 14px rgba(255, 0, 0, 0.95),
        0 0 28px rgba(255, 0, 0, 0.88),
        0 0 56px rgba(255, 0, 0, 0.75),
        0 0 110px rgba(255, 0, 0, 0.45);
      animation: titleGlow 2.2s ease-in-out infinite alternate;
    }

    h1::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -8px;
      height: 3px;
      background: linear-gradient(to right, transparent, rgba(255,0,0,0.9), transparent);
      filter: blur(1px);
      opacity: 0.85;
    }

    .tagline {
      font-size: clamp(22px, 2.2vw, 40px);
      line-height: 1.4;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #ffeaea;
      text-transform: uppercase;
      margin: 18px 0;
      text-shadow:
        0 0 8px rgba(255,255,255,0.16),
        0 0 18px rgba(255,60,60,0.12);
      opacity: 0;
      transform: translateY(18px);
      animation: lineIn 0.8s ease forwards;
    }

    .tagline:nth-of-type(1) { animation-delay: 0.35s; }
    .divider:nth-of-type(1) { animation-delay: 0.55s; }
    .tagline:nth-of-type(2) { animation-delay: 0.75s; }
    .divider:nth-of-type(2) { animation-delay: 0.95s; }
    .tagline:nth-of-type(3) { animation-delay: 1.15s; }
    .divider:nth-of-type(3) { animation-delay: 1.35s; }
    .tagline.small { animation-delay: 1.55s; }

    .danger {
      color: #ff2b2b;
      text-shadow:
        0 0 8px rgba(255,0,0,0.85),
        0 0 18px rgba(255,0,0,0.55),
        0 0 36px rgba(255,0,0,0.35);
    }

    .divider {
      width: 80px;
      height: 3px;
      margin: 14px auto;
      border-radius: 999px;
      background: #ff1a1a;
      box-shadow:
        0 0 8px rgba(255, 0, 0, 0.9),
        0 0 20px rgba(255, 0, 0, 0.7),
        0 0 40px rgba(255, 0, 0, 0.45);
      opacity: 0;
      transform: scaleX(0.5);
      animation: dividerIn 0.6s ease forwards;
    }

    .small {
      font-size: clamp(18px, 1.8vw, 34px);
      margin-top: 24px;
    }

    .reflection {
      position: absolute;
      left: 50%;
      bottom: 4vh;
      transform: translateX(-50%);
      width: min(1100px, 92vw);
      height: 120px;
      z-index: 2;
      background:
        radial-gradient(ellipse at center, rgba(255,0,0,0.22) 0%, rgba(255,0,0,0.10) 35%, rgba(255,0,0,0.03) 55%, transparent 72%);
      filter: blur(18px);
      opacity: 0.95;
      pointer-events: none;
    }

    @keyframes titleGlow {
      from {
        text-shadow:
          0 0 6px rgba(255, 0, 0, 0.95),
          0 0 14px rgba(255, 0, 0, 0.95),
          0 0 28px rgba(255, 0, 0, 0.88),
          0 0 56px rgba(255, 0, 0, 0.75),
          0 0 110px rgba(255, 0, 0, 0.45);
      }
      to {
        text-shadow:
          0 0 10px rgba(255, 40, 40, 1),
          0 0 20px rgba(255, 30, 30, 1),
          0 0 42px rgba(255, 20, 20, 0.95),
          0 0 90px rgba(255, 0, 0, 0.85),
          0 0 160px rgba(255, 0, 0, 0.52);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lineIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes dividerIn {
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @media (max-width: 700px) {
      .wrap {
        padding: 24px 14px;
      }

      .divider {
        width: 58px;
        margin: 12px auto;
      }

      .reflection {
        height: 80px;
        bottom: 6vh;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <canvas id="rain"></canvas>
  <div class="scanline"></div>
  <div class="reflection"></div>

  <div class="wrap">
    <div class="content">
      <h1>KillYouToken</h1>

      <p class="tagline">THE MOST <span class="danger">DANGEROUS</span> MEME TOKEN.</p>
      <div class="divider"></div>

      <p class="tagline">NOT A PROMISE. NOT A UTILITY. JUST PURE <span class="danger">CHAOS.</span></p>
      <div class="divider"></div>

      <p class="tagline">BUY AT YOUR OWN <span class="danger">RISK.</span> WE WARNED YOU.</p>
      <div class="divider"></div>

      <p class="tagline small">THIS IS NOT FINANCIAL ADVICE.</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("rain");
    const ctx = canvas.getContext("2d");

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    const rainDrops = [];
    const rainCount = Math.floor((width * height) / 18000);

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createDrop(initial = false) {
      return {
        x: random(0, width),
        y: initial ? random(0, height) : random(-height * 0.2, -20),
        len: random(18, 42),
        speed: random(8, 20),
        thickness: random(0.6, 1.5),
        alpha: random(0.16, 0.45)
      };
    }

    function setupRain() {
      rainDrops.length = 0;
      for (let i = 0; i < rainCount; i++) {
        rainDrops.push(createDrop(true));
      }
    }

    function drawRain() {
      ctx.clearRect(0, 0, width, height);

      for (let i = 0; i < rainDrops.length; i++) {
        const d = rainDrops[i];

        const gradient = ctx.createLinearGradient(d.x, d.y, d.x, d.y + d.len);
        gradient.addColorStop(0, `rgba(255,255,255,0)`);
        gradient.addColorStop(0.35, `rgba(255,255,255,${d.alpha * 0.55})`);
        gradient.addColorStop(1, `rgba(255,255,255,${d.alpha})`);

        ctx.beginPath();
        ctx.strokeStyle = gradient;
        ctx.lineWidth = d.thickness;
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y + d.len);
        ctx.stroke();

        if (d.y > height * 0.78) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(255, 40, 40, ${d.alpha * 0.08})`;
          ctx.lineWidth = d.thickness * 1.2;
          ctx.moveTo(d.x, d.y + d.len);
          ctx.lineTo(d.x, d.y + d.len + 5);
          ctx.stroke();
        }

        d.y += d.speed;
        d.x += 0.15;

        if (d.y > height + d.len) {
          rainDrops[i] = createDrop(false);
        }
      }

      requestAnimationFrame(drawRain);
    }

    window.addEventListener("resize", () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      setupRain();
    });

    setupRain();
    drawRain();
  </script>
</body>
</html>
